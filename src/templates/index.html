<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        :root {
            --bg: #f9fafb;
            --text: #111827;
            --border: #e5e7eb;
            --card: #ffffff;
            --accent: #374151;
            --accent-hover: #1f2937;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        /* Form styling */
        .form-section {
            background: var(--card);
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        input,
        textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.875rem;
        }

        button {
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.875rem;
            border: 1px solid var(--border);
            background: var(--accent);
            color: white;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button.outline {
            background: white;
            color: var(--text);
        }

        button.danger {
            background: transparent;
            color: var(--danger);
            border-color: transparent;
        }

        button.danger:hover {
            background: #fee2e2;
        }

        /* List styling */
        .item-list {
            display: grid;
            gap: 0.75rem;
        }

        .item-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-content h3 {
            margin: 0;
            font-size: 1rem;
        }

        .item-content p {
            margin: 0;
            font-size: 0.875rem;
            color: #6b7280;
        }

        .item-actions {
            display: flex;
            gap: 0.5rem;
        }

        .price-tag {
            font-weight: 600;
            margin-right: 1rem;
        }

        /* Modal simple */
        #editModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>{{ app_name }}</h1>
        </header>

        <!-- Formulaire d'ajout -->
        <section class="form-section">
            <h2 style="font-size: 1.1rem; margin-top: 0;">Ajouter un item</h2>
            <form id="addForm">
                <div class="form-group">
                    <label for="title">Titre</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="2"></textarea>
                </div>
                <div class="form-group" style="width: 150px;">
                    <label for="price">Prix (€)</label>
                    <input type="number" id="price" value="0">
                </div>
                <button type="submit">Enregistrer</button>
            </form>
        </section>

        <!-- Liste des items -->
        <div class="item-list" id="itemList">
            {% for item in items %}
            <div class="item-card" id="item-{{ item.id }}">
                <div class="item-content">
                    <h3>{{ item.title }}</h3>
                    <p>{{ item.description or '' }}</p>
                </div>
                <div style="display: flex; align-items: center;">
                    <span class="price-tag">{{ item.price }} €</span>
                    <div class="item-actions">
                        <button class="outline"
                            onclick="openEdit({{ item.id }}, '{{ item.title }}', '{{ item.description or '' }}', {{ item.price }})">Modifier</button>
                        <button class="danger" onclick="deleteItem({{ item.id }})">Supprimer</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <!-- Pagination -->
        {% if total_pages > 1 %}
        <div style="margin-top: 2rem; display: flex; justify-content: center; gap: 0.5rem; align-items: center;">
            {% if page > 1 %}
            <a href="/?page={{ page - 1 }}" style="text-decoration: none;"><button class="outline">&laquo; Précédent</button></a>
            {% endif %}

            <span style="font-size: 0.875rem; color: #6b7280;">Page {{ page }} sur {{ total_pages }}</span>

            {% if page < total_pages %}
            <a href="/?page={{ page + 1 }}" style="text-decoration: none;"><button class="outline">Suivant &raquo;</button></a>
            {% endif %}
        </div>
        {% endif %}
    </div>

    <!-- Modal de modification -->
    <div id="editModal">
        <div class="form-section" style="width: 400px;">
            <h2 style="font-size: 1.1rem; margin-top: 0;">Modifier l'item</h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editTitle">Titre</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label for="editDescription">Description</label>
                    <textarea id="editDescription" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label for="editPrice">Prix (€)</label>
                    <input type="number" id="editPrice">
                </div>
                <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                    <button type="button" class="outline" onclick="closeEdit()">Annuler</button>
                    <button type="submit">Mettre à jour</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Ajouter un item
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                price: parseInt(document.getElementById('price').value)
            };

            const response = await fetch('/items/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) location.reload();
        });

        // Supprimer un item
        async function deleteItem(id) {
            if (!confirm('Supprimer cet item ?')) return;
            const response = await fetch(`/items/${id}`, { method: 'DELETE' });
            if (response.ok) {
                document.getElementById(`item-${id}`).remove();
            }
        }

        // Modifier - Ouvrir Modal
        function openEdit(id, title, desc, price) {
            document.getElementById('editId').value = id;
            document.getElementById('editTitle').value = title;
            document.getElementById('editDescription').value = desc;
            document.getElementById('editPrice').value = price;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEdit() {
            document.getElementById('editModal').style.display = 'none';
        }

        // Modifier - Soumettre
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('editTitle').value,
                description: document.getElementById('editDescription').value,
                price: parseInt(document.getElementById('editPrice').value)
            };

            const response = await fetch(`/items/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) location.reload();
        });
    </script>
</body>

</html>
